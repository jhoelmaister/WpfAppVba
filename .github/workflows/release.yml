name: Publicar release (Velopack)

# Cómo se dispara:
#   A) Empujando un tag vX.Y.Z   -> git tag v1.0.1 && git push origin v1.0.1
#   B) A mano desde GitHub        -> pestaña "Actions" > este workflow > "Run workflow"
#
# El patrón exige un dígito después de la 'v' para que los tags del Visor
# Empresa (visor-vX.Y.Z, que también empiezan con 'v') NO disparen esta
# release de la app principal — el visor tiene su propio workflow.
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej. 1.0.1). Vacío = usar la del csproj.'
        required: false

permissions:
  contents: write   # necesario para crear la Release y subir los archivos

jobs:
  release:
    runs-on: windows-latest   # compila la app WPF en un Windows de la nube

    steps:
      - name: Clonar repo
        uses: actions/checkout@v5

      - name: Instalar .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Instalar vpk (CLI de Velopack)
        run: dotnet tool install -g vpk

      - name: Determinar versión
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              # Tag vX.Y.Z -> quitar la 'v' inicial
              $v = "${{ github.ref_name }}".TrimStart("v")
            } else {
              # Leer <Version> del csproj
              $m = Select-String -Path SistemaGestion/SistemaGestion.csproj `
                                  -Pattern '<Version>\s*([^<]+?)\s*</Version>' | Select-Object -First 1
              $v = $m.Matches[0].Groups[1].Value.Trim()
            }
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw "No se pudo determinar la versión." }
          Write-Host "Versión a publicar: $v"
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained single-file)
        run: >
          dotnet publish SistemaGestion/SistemaGestion.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:DebugType=none
          -o ./publish

      - name: Descargar release anterior (para generar delta)
        # vpk pack solo genera delta si encuentra localmente el .nupkg full de la
        # versión previa. Cada corrida de Actions empieza desde cero, así que sin este
        # paso siempre se publica solo el paquete full (descarga completa para el usuario).
        # continue-on-error: en la primera release no hay nada que descargar.
        continue-on-error: true
        run: >
          vpk download github
          --repoUrl https://github.com/jhoelmaister/wpfappvba
          --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack (Setup.exe + nupkg full/delta + RELEASES)
        run: >
          vpk pack
          --packId SistemaGestion
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir ./publish
          --mainExe SistemaGestion.exe
          --packTitle "Sistema de Gestión"
          --icon SistemaGestion/icono.ico

      - name: Upload (publica la Release en este repo)
        run: >
          vpk upload github
          --repoUrl https://github.com/jhoelmaister/wpfappvba
          --publish
          --releaseName "Sistema de Gestión v${{ steps.ver.outputs.version }}"
          --tag "v${{ steps.ver.outputs.version }}"
          --token ${{ secrets.GITHUB_TOKEN }}
