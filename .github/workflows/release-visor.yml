name: Publicar release Visor Empresa (Velopack)

# Cómo se dispara:
#   A) Empujando un tag visor-vX.Y.Z -> git tag visor-v0.1.0 && git push origin visor-v0.1.0
#   B) A mano desde GitHub            -> pestaña "Actions" > este workflow > "Run workflow"
#
# Publica en las releases de ESTE MISMO repo, pero en el canal Velopack "visor"
# (packId VisorEmpresa): así no interfiere con el feed de la app principal
# (packId SistemaGestion, canal por defecto "win") — cada app lee su propio
# releases.{canal}.json y sus propios paquetes.
on:
  push:
    tags:
      - 'visor-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar (ej. 0.1.0). Vacío = usar la del csproj.'
        required: false

permissions:
  contents: write   # necesario para crear la Release y subir los archivos

jobs:
  release:
    runs-on: windows-latest   # compila la app WPF en un Windows de la nube

    steps:
      - name: Clonar repo
        uses: actions/checkout@v5

      - name: Instalar .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Instalar vpk (CLI de Velopack)
        run: dotnet tool install -g vpk

      - name: Determinar versión
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($v)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              # Tag visor-vX.Y.Z -> quitar el prefijo 'visor-v'
              $v = "${{ github.ref_name }}" -replace '^visor-v', ''
            } else {
              # Leer <Version> del csproj del visor
              $m = Select-String -Path VisorEmpresa/VisorEmpresa.csproj `
                                  -Pattern '<Version>\s*([^<]+?)\s*</Version>' | Select-Object -First 1
              $v = $m.Matches[0].Groups[1].Value.Trim()
            }
          }
          if ([string]::IsNullOrWhiteSpace($v)) { throw "No se pudo determinar la versión." }
          Write-Host "Versión a publicar: $v"
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Publish (self-contained single-file)
        run: >
          dotnet publish VisorEmpresa/VisorEmpresa.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:DebugType=none
          -o ./publish

      - name: Descargar release anterior (para generar delta)
        # vpk pack solo genera delta si encuentra localmente el .nupkg full de la
        # versión previa del MISMO canal. continue-on-error: en la primera release
        # del visor no hay nada que descargar.
        continue-on-error: true
        run: >
          vpk download github
          --repoUrl https://github.com/jhoelmaister/wpfappvba
          --channel visor
          --token ${{ secrets.GITHUB_TOKEN }}

      - name: Pack (Setup.exe + nupkg full/delta + releases.visor.json)
        run: >
          vpk pack
          --packId VisorEmpresa
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir ./publish
          --mainExe VisorEmpresa.exe
          --packTitle "Visor Empresa"
          --icon WpfAppVba/icono.ico
          --channel visor

      - name: Upload (publica la Release en este repo)
        run: >
          vpk upload github
          --repoUrl https://github.com/jhoelmaister/wpfappvba
          --channel visor
          --publish
          --releaseName "Visor Empresa v${{ steps.ver.outputs.version }}"
          --tag "visor-v${{ steps.ver.outputs.version }}"
          --token ${{ secrets.GITHUB_TOKEN }}
